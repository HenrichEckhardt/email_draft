<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Genesys Email Draft Injector</title>

  <!-- Genesys Cloud Platform API JavaScript SDK -->
  <script src="https://sdk-cdn.mypurecloud.com/javascript/latest/purecloud-platform-client-v2.min.js"></script>

  <style>
    :root {
      font-family: Arial, Helvetica, sans-serif;
      color: #222;
      background: #f7f8fa;
    }
    body {
      margin: 0;
      padding: 12px;
      font-size: 14px;
    }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    h1 {
      font-size: 16px;
      margin: 0 0 10px;
    }
    label {
      display: block;
      font-weight: 600;
      margin: 10px 0 4px;
    }
    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      font: inherit;
    }
    input, select, textarea {
      border: 1px solid #c9ced6;
      border-radius: 5px;
      padding: 8px;
      background: #fff;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    button {
      border: 0;
      border-radius: 5px;
      padding: 9px 12px;
      margin-top: 10px;
      cursor: pointer;
      font-weight: 600;
      background: #2f6fed;
      color: #fff;
    }
    button.secondary {
      background: #5f6b7a;
    }
    button:disabled {
      background: #adb5bd;
      cursor: not-allowed;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 5px;
      white-space: pre-wrap;
      word-break: break-word;
      background: #eef3ff;
      border: 1px solid #c8d7ff;
    }
    .status.error {
      background: #fff0f0;
      border-color: #ffcaca;
    }
    .status.success {
      background: #eefaf1;
      border-color: #c8edcf;
    }
    .small {
      font-size: 12px;
      color: #606975;
      line-height: 1.35;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Genesys Email Draft Injector</h1>
    <div class="small">
      This page logs in with the active agent's Genesys Cloud user context using OAuth PKCE, then updates the selected active email conversation draft.
    </div>

    <label for="region">Genesys Cloud Region</label>
    <select id="region">
      <option value="eu_west_1">EU West 1 - mypurecloud.ie</option>
      <option value="eu_central_1">EU Central 1 - mypurecloud.de</option>
      <option value="us_east_1">US East 1 - mypurecloud.com</option>
      <option value="us_west_2">US West 2 - usw2.pure.cloud</option>
      <option value="ca_central_1">Canada - cac1.pure.cloud</option>
      <option value="ap_southeast_2">AP Southeast 2 - mypurecloud.com.au</option>
      <option value="ap_northeast_1">AP Northeast 1 - mypurecloud.jp</option>
      <option value="ap_northeast_2">AP Northeast 2 - apne2.pure.cloud</option>
      <option value="ap_south_1">AP South 1 - aps1.pure.cloud</option>
      <option value="sa_east_1">SA East 1 - sae1.pure.cloud</option>
      <option value="me_central_1">ME Central 1 - mec1.pure.cloud</option>
    </select>

    <label for="conversationId">Conversation ID</label>
    <input id="conversationId" placeholder="Passed by widget URL or selected from active emails" />

    <div class="row">
      <button id="loginBtn" type="button">Login / Refresh Token</button>
      <button id="loadActiveBtn" class="secondary" type="button" disabled>Load Active Emails</button>
    </div>

    <div id="activeEmailArea" class="hidden">
      <label for="activeEmails">Active email conversations for this agent</label>
      <select id="activeEmails"></select>
    </div>

    <label for="subject">Subject</label>
    <input id="subject" placeholder="Leave empty to preserve the generated Genesys reply subject" />

    <label for="insertMode">Injection mode</label>
    <select id="insertMode">
      <option value="prepend">Add content before the generated signature/history</option>
      <option value="append">Add content after the generated signature/history</option>
      <option value="replace">Replace generated draft body with my content</option>
    </select>

    <label for="textBody">Plain Text Content To Add</label>
    <textarea id="textBody">Hello,

This is a generated draft inserted by the external interaction widget.

</textarea>

    <label for="htmlBody">HTML Content To Add</label>
    <textarea id="htmlBody"><p>Hello,</p><p>This is a generated draft inserted by the external interaction widget.</p></textarea>

    <div class="row">
      <button id="getDraftBtn" class="secondary" type="button" disabled>Get Current Draft</button>
      <button id="injectBtn" type="button" disabled>Reset, Generate Reply, Add Text</button>
    </div>

    <div id="status" class="status">Initializing...</div>
  </div>

  <script>
    /**********************************************************************
     * REQUIRED CONFIGURATION
     * 1. Create a Genesys Cloud OAuth client with Authorization Code / PKCE.
     * 2. Put the client ID below.
     * 3. Add your GitHub Pages URL as an authorized redirect URI exactly.
     *
     * Example redirect URI:
     * https://YOUR_GITHUB_USER.github.io/YOUR_REPO/genesys-email-draft-widget.html
     **********************************************************************/
    const CONFIG = {
      clientId: "21f0686f-cc19-43e5-bdfa-b074cbbe0479",

      // Must exactly match the URL configured on the OAuth client.
      // Leaving this as window.location.origin + window.location.pathname works well for GitHub Pages.
      redirectUri: window.location.origin + window.location.pathname,

      // Automatically start OAuth login when page loads.
      autoLogin: true,

      // Automatically load active emails after login.
      autoLoadActiveEmails: true,

      // Automatically inject when autoInject=true appears in the URL.
      // Example: ?conversationId=...&autoInject=true
      allowAutoInjectFromUrl: true
    };

    const platformClient = require("platformClient");
    const client = platformClient.ApiClient.instance;
    const conversationsApi = new platformClient.ConversationsApi();

    const els = {
      region: document.getElementById("region"),
      conversationId: document.getElementById("conversationId"),
      loginBtn: document.getElementById("loginBtn"),
      loadActiveBtn: document.getElementById("loadActiveBtn"),
      getDraftBtn: document.getElementById("getDraftBtn"),
      injectBtn: document.getElementById("injectBtn"),
      activeEmailArea: document.getElementById("activeEmailArea"),
      activeEmails: document.getElementById("activeEmails"),
      subject: document.getElementById("subject"),
      insertMode: document.getElementById("insertMode"),
      textBody: document.getElementById("textBody"),
      htmlBody: document.getElementById("htmlBody"),
      status: document.getElementById("status")
    };

    function setStatus(message, type) {
      els.status.textContent = message;
      els.status.className = "status" + (type ? " " + type : "");
    }

    function getParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function getFirstParam(names) {
      for (const name of names) {
        const value = getParam(name);
        if (value) return value;
      }
      return "";
    }

    function setRegion(regionKey) {
      const hosts = platformClient.PureCloudRegionHosts;
      if (!hosts[regionKey]) {
        throw new Error("Unknown Genesys Cloud region key: " + regionKey);
      }
      client.setEnvironment(hosts[regionKey]);
      localStorage.setItem("gc_draft_widget_region", regionKey);
    }

    function applyUrlConfiguration() {
      const savedRegion = localStorage.getItem("gc_draft_widget_region");
      const regionFromUrl = getFirstParam(["region", "gc_region", "environment"]);
      const region = regionFromUrl || savedRegion || els.region.value;

      if ([...els.region.options].some(o => o.value === region)) {
        els.region.value = region;
      }
      setRegion(els.region.value);

      const conversationId = getFirstParam([
        "conversationId",
        "gcConversationId",
        "interactionId",
        "conversation_id"
      ]);
      if (conversationId) {
        els.conversationId.value = conversationId;
      }

      const subject = getParam("subject");
      const textBody = getParam("textBody");
      const htmlBody = getParam("htmlBody");
      const insertMode = getParam("insertMode");

      if (subject) els.subject.value = subject;
      if (textBody) els.textBody.value = textBody;
      if (htmlBody) els.htmlBody.value = htmlBody;
      if (insertMode && [...els.insertMode.options].some(o => o.value === insertMode)) {
        els.insertMode.value = insertMode;
      }
    }

    function requireConfiguredClientId() {
      if (!CONFIG.clientId || CONFIG.clientId.includes("PASTE_YOUR")) {
        throw new Error("Configure CONFIG.clientId with your Genesys Cloud OAuth PKCE client ID first.");
      }
    }

    async function login() {
      requireConfiguredClientId();
      setRegion(els.region.value);

      setStatus("Authenticating with Genesys Cloud as the current agent...");

      // Persist token/settings across iframe reloads.
      client.setPersistSettings(true, "gc_draft_widget");

      await client.loginPKCEGrant(CONFIG.clientId, CONFIG.redirectUri, {
        state: "genesys-email-draft-widget"
      });

      els.loadActiveBtn.disabled = false;
      els.getDraftBtn.disabled = false;
      els.injectBtn.disabled = false;
      setStatus("Authenticated with Genesys Cloud as the current agent.", "success");

      if (CONFIG.autoLoadActiveEmails) {
        await loadActiveEmails();
      }

      if (CONFIG.allowAutoInjectFromUrl && getParam("autoInject") === "true") {
        await injectDraft();
      }
    }

    function summarizeConversation(conversation) {
      const id = conversation.id || conversation.conversationId || "unknown";
      let customer = "Email conversation";

      if (Array.isArray(conversation.participants)) {
        const external = conversation.participants.find(p => p.purpose === "customer" || p.purpose === "external");
        if (external) {
          customer = external.name || external.address || external.email || customer;
        }
      }

      return customer + " | " + id;
    }

    async function loadActiveEmails() {
      setStatus("Loading active email conversations for this logged-in agent...");

      const result = await conversationsApi.getConversationsEmails();
      const entities = result.entities || [];

      els.activeEmails.innerHTML = "";

      if (!entities.length) {
        els.activeEmailArea.classList.add("hidden");
        setStatus("No active email conversations were returned for this agent. Make sure the agent has accepted/opened an email interaction.", "error");
        return;
      }

      for (const c of entities) {
        const id = c.id || c.conversationId;
        if (!id) continue;
        const opt = document.createElement("option");
        opt.value = id;
        opt.textContent = summarizeConversation(c);
        els.activeEmails.appendChild(opt);
      }

      els.activeEmailArea.classList.remove("hidden");

      if (!els.conversationId.value && els.activeEmails.options.length) {
        els.conversationId.value = els.activeEmails.value;
      }

      setStatus("Loaded " + entities.length + " active email conversation(s). Select one, then inject the draft.", "success");
    }

    async function getCurrentDraft() {
      const conversationId = els.conversationId.value.trim();
      if (!conversationId) {
        setStatus("Missing conversationId.", "error");
        return;
      }

      setStatus("Reading current draft...");
      try {
        const draft = await readDraft(conversationId);
        setStatus("Current draft:\n" + JSON.stringify(draft, null, 2), "success");
      } catch (err) {
        setStatus("Failed to get draft:\n" + formatError(err), "error");
      }
    }

    async function readDraft(conversationId) {
      return conversationsApi.getConversationsEmailMessagesDraft(conversationId);
    }

    async function resetAndAutoFillDraft(conversationId) {
      // This is the important step that mimics starting a fresh reply in Genesys Cloud.
      // discard=true resets/removes the existing draft content.
      // autoFill=true asks Genesys Cloud to generate the base reply content, including
      // org/user defaults such as the agent signature when configured.
      return conversationsApi.patchConversationsEmailMessagesDraft(conversationId, {
        discard: true,
        autoFill: true,
        body: {}
      });
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function hasUsableDraftContent(draft) {
      if (!draft) return false;
      return Boolean(
        (typeof draft.htmlBody === "string" && draft.htmlBody.trim()) ||
        (typeof draft.textBody === "string" && draft.textBody.trim()) ||
        (typeof draft.subject === "string" && draft.subject.trim()) ||
        Array.isArray(draft.to) || Array.isArray(draft.cc) || Array.isArray(draft.bcc)
      );
    }

    async function waitForGeneratedDraft(conversationId, firstDraft) {
      if (hasUsableDraftContent(firstDraft)) return firstDraft;

      let lastDraft = firstDraft;
      for (let i = 0; i < 6; i++) {
        await sleep(500);
        try {
          lastDraft = await readDraft(conversationId);
          if (hasUsableDraftContent(lastDraft)) return lastDraft;
        } catch (err) {
          // Keep polling briefly; draft generation can lag immediately after reset/autofill.
          lastDraft = null;
        }
      }
      return lastDraft || {};
    }

    function normalizeHtmlFragment(html) {
      const value = (html || "").trim();
      if (!value) return "";
      return value;
    }

    function normalizeTextFragment(text) {
      const value = text || "";
      return value.replace(/\s+$/g, "");
    }

    function combineText(injectedText, baseText, mode) {
      const add = normalizeTextFragment(injectedText);
      const base = baseText || "";

      if (mode === "replace") return add;
      if (!add) return base;
      if (!base) return add;
      if (mode === "append") return base.replace(/\s+$/g, "") + "\n\n" + add;
      return add + "\n\n" + base.replace(/^\s+/g, "");
    }

    function combineHtml(injectedHtml, baseHtml, mode) {
      const add = normalizeHtmlFragment(injectedHtml);
      const base = baseHtml || "";

      if (mode === "replace") return add;
      if (!add) return base;
      if (!base) return add;
      if (mode === "append") return base + "<br>" + add;
      return add + "<br>" + base;
    }

    function buildDraftUpdateBody(generatedDraft) {
      const mode = els.insertMode.value || "prepend";
      const update = {};

      // Preserve addressing and reply metadata from the newly generated Genesys draft.
      // This avoids losing To/Cc/Bcc/reply mode values created by the native reply workflow.
      [
        "to",
        "cc",
        "bcc",
        "from",
        "replyTo",
        "subject",
        "historyIncluded",
        "draftType"
      ].forEach(key => {
        if (generatedDraft && generatedDraft[key] !== undefined && generatedDraft[key] !== null) {
          update[key] = generatedDraft[key];
        }
      });

      // Subject from UI wins only when the user typed something. Otherwise preserve Genesys draft subject.
      const uiSubject = els.subject.value.trim();
      if (uiSubject) update.subject = uiSubject;

      update.textBody = combineText(els.textBody.value, generatedDraft && generatedDraft.textBody, mode);
      update.htmlBody = combineHtml(els.htmlBody.value, generatedDraft && generatedDraft.htmlBody, mode);

      if (!update.draftType) update.draftType = "Reply";
      if (update.historyIncluded === undefined) update.historyIncluded = true;

      return update;
    }

    async function injectDraft() {
      const conversationId = els.conversationId.value.trim();
      if (!conversationId) {
        setStatus("Missing conversationId. Pass it in the URL or load active emails.", "error");
        return;
      }

      setStatus(
        "Step 1/4: Reading current draft...\n" +
        "Step 2/4: Resetting the draft and asking Genesys Cloud to auto-fill a fresh reply..."
      );

      try {
        let originalDraft = null;
        try {
          originalDraft = await readDraft(conversationId);
        } catch (err) {
          // If there is no active draft yet, continue to PATCH autoFill below.
          originalDraft = null;
        }

        const generatedFromPatch = await resetAndAutoFillDraft(conversationId);

        setStatus(
          "Step 1/4: Original draft read " + (originalDraft ? "successfully" : "was not available") + ".\n" +
          "Step 2/4: Fresh reply requested.\n" +
          "Step 3/4: Re-reading generated reply/signature..."
        );

        const generatedDraft = await waitForGeneratedDraft(conversationId, generatedFromPatch);
        const updateBody = buildDraftUpdateBody(generatedDraft || {});

        setStatus(
          "Step 1/4: Original draft read " + (originalDraft ? "successfully" : "was not available") + ".\n" +
          "Step 2/4: Fresh reply requested.\n" +
          "Step 3/4: Generated reply/signature read.\n" +
          "Step 4/4: Injecting final draft content..."
        );

        const response = await conversationsApi.putConversationsEmailMessagesDraft(conversationId, updateBody);
        setStatus(
          "Draft reset, regenerated, and updated successfully.\n\n" +
          "Final PUT body:\n" + JSON.stringify(updateBody, null, 2) +
          "\n\nResponse:\n" + JSON.stringify(response, null, 2),
          "success"
        );
      } catch (err) {
        setStatus("Failed to reset/generate/inject draft:\n" + formatError(err), "error");
      }
    }

    function formatError(err) {
      if (!err) return "Unknown error";
      if (err.body) return JSON.stringify(err.body, null, 2);
      if (err.response && err.response.body) return JSON.stringify(err.response.body, null, 2);
      if (err.message) return err.message;
      try { return JSON.stringify(err, null, 2); } catch (e) { return String(err); }
    }

    els.region.addEventListener("change", () => {
      try {
        setRegion(els.region.value);
        setStatus("Region set to " + els.region.value + ". Login again if you changed region after authenticating.");
      } catch (err) {
        setStatus(formatError(err), "error");
      }
    });

    els.loginBtn.addEventListener("click", () => login().catch(err => setStatus("Login failed:\n" + formatError(err), "error")));
    els.loadActiveBtn.addEventListener("click", () => loadActiveEmails().catch(err => setStatus("Failed to load active emails:\n" + formatError(err), "error")));
    els.getDraftBtn.addEventListener("click", () => getCurrentDraft());
    els.injectBtn.addEventListener("click", () => injectDraft());

    els.activeEmails.addEventListener("change", () => {
      els.conversationId.value = els.activeEmails.value;
    });

    (async function init() {
      try {
        applyUrlConfiguration();
        if (CONFIG.autoLogin) {
          await login();
        } else {
          setStatus("Ready. Click Login / Refresh Token.");
        }
      } catch (err) {
        setStatus(formatError(err), "error");
      }
    })();
  </script>
</body>
</html>
